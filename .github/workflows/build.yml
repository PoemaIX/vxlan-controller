name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          suffix="${{ matrix.goarch }}"
          [ -n "${{ matrix.goarm }}" ] && suffix="${suffix}v${{ matrix.goarm }}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          go build -trimpath -ldflags="-s -w -X main.Version=${version}" -o "vxlan-controller-${suffix}" ./cmd/vxlan-controller

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vxlan-controller-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: vxlan-controller-*

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, vet]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/vxlan-controller-*/; do
            cp "$dir"vxlan-controller-* release/
          done
          cd release && sha256sum vxlan-controller-* > checksums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: release/*

  # Rolling "dev" prerelease: every push to main moves the dev tag to HEAD
  # and replaces the release assets, so `install.sh` (default channel: dev)
  # always fetches the latest main build.
  dev-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, vet]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/vxlan-controller-*/; do
            cp "$dir"vxlan-controller-* release/
          done
          cd release && sha256sum vxlan-controller-* > checksums.txt

      - name: Move dev tag to HEAD
        run: |
          git tag -f dev
          git push -f origin dev

      - name: Update dev prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short="${GITHUB_SHA::7}"
          if ! gh release view dev >/dev/null 2>&1; then
            gh release create dev --prerelease \
              --title "Development build (${short})" \
              --notes "Rolling build of main @ ${GITHUB_SHA}. Updated on every push."
          else
            gh release edit dev --prerelease \
              --title "Development build (${short})" \
              --notes "Rolling build of main @ ${GITHUB_SHA}. Updated on every push."
          fi
          gh release upload dev release/* --clobber
